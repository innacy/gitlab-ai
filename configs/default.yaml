# Git Agent CLI — Default Configuration (sample)
# Copy to config.yaml in the project root and fill in your values.

# Platform: "gitlab" (default), "github", "bitbucket" (future)
# platform: gitlab

# GitLab connection
gitlab:
  base_url: "https://gitlab.example.com/"
  api_version: "v4"
  # default_project: "group/my-project"
  # parent_folder: "/home/user/projects"   # folder containing multiple git repos (for all-in-one)

# AI provider: "anthropic" or "gemini"
ai:
  provider: "anthropic"
  timeout_seconds: 180       # HTTP timeout for AI API calls (default: 180)

  anthropic:
    api_key: ""              # or set ANTHROPIC_API_KEY env var
    # api_key_env: "ANTHROPIC_API_KEY"
    model: "claude-sonnet-4-20250514"
    max_tokens: 8192
    temperature: 0.7

  gemini:
    api_key: ""              # or set GEMINI_API_KEY env var
    # api_key_env: "GEMINI_API_KEY"
    model: "gemini-2.5-flash"
    max_tokens: 8192

  nvidia:
    api_key: ""              # or set NVIDIA_API_KEY env var
    # api_key_env: "NVIDIA_API_KEY"
    model: "meta/llama-3.1-70b-instruct"
    max_tokens: 8192

# Review template sections used by mr-review
review:
  template:
    sections:
      - name: "Summary"
        prompt: "Provide a brief summary of the changes"
        required: true
      - name: "Code Quality"
        prompt: "Assess code quality, readability, and maintainability"
        required: true
      - name: "Security Concerns"
        prompt: "Identify any security vulnerabilities or risks"
        required: true
      - name: "Performance Impact"
        prompt: "Evaluate potential performance implications"
        required: false
      - name: "Suggestions"
        prompt: "Provide actionable improvement suggestions"
        required: true
      - name: "Approval Recommendation"
        prompt: "Recommend approve, request changes, or reject with reasoning"
        required: true

  output:
    directory: "./reviews"
    filename_pattern: "{project}_{mr_number}.md"
    include_metadata: true
    include_diff: false

  filters:
    exclude_files:
      - "*.lock"
      - "vendor/*"
      - "*.generated.go"

# Issue / ticket output settings
issues:
  output:
    directory: "./tickets"
    filename_pattern: "{project}_issues_{date}.md"
  fields:
    - "id"
    - "title"
    - "description"
    - "state"
    - "labels"
    - "assignee"
    - "created_at"
    - "updated_at"
    - "due_date"
    - "milestone"
    - "web_url"

# Teams — GitLab group prefixes to scope the session
# teams:
#   - "my-team"

# Projects — pre-configured project paths for ticket-open
# One entry = auto-selected, multiple = prompted to choose
# projects:
#   - "my-team/backend"
#   - "my-team/frontend"

# Ignored projects — excluded from tickets / tickets-black reports
# ignored_projects:
#   - "my-team/testcase"

# CLI behaviour
cli:
  color_output: true           # set false or NO_COLOR env var to disable
  markdown_rendering: true
  verbose: false
  confirm_before_post: true
  idle_timeout_minutes: 60     # auto-exit after N minutes of inactivity (default: 60)
  output_format: text          # "text" (default) or "json" for machine-readable output
  theme: default               # "default" (Claude Code-inspired)
